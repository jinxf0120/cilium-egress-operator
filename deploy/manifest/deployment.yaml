apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-egress-operator
  namespace: kube-system
  labels:
    app: cilium-egress-operator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cilium-egress-operator
  template:
    metadata:
      labels:
        app: cilium-egress-operator
    spec:
      serviceAccountName: cilium-egress-operator
      securityContext:
        fsGroup: 65532
      containers:
        - name: manager
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          image: cilium-egress-operator:v0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
