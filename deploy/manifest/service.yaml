apiVersion: v1
kind: Service
metadata:
  name: cilium-egress-operator-metrics
  namespace: kube-system
  labels:
    app: cilium-egress-operator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: cilium-egress-operator
